<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Timetable | Suvan Teja</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* === BASE & RESET === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Hide default cursor */
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Darker, near-black animated background */
            background: linear-gradient(-45deg, #000000, #121212, #080808, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* === CURSOR EFFECT === */
        .cursor-dot {
            width: 6px;
            height: 6px;
            background: #64ffda;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            box-shadow: 0 0 10px #64ffda, 0 0 20px rgba(100, 255, 218, 0.8);
            transition: top 0.05s, left 0.05s;
        }

        .cursor-trail {
            width: 36px;
            height: 36px;
            border: 1px solid rgba(100, 255, 218, 0.3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9998;
            transition: top 0.15s ease-out, left 0.15s ease-out;
        }

        @media (pointer: coarse) {
            * { cursor: auto; }
            .cursor-dot, .cursor-trail { display: none; }
        }

        /* === LAYOUT & SQUIRCLES === */
        .container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 900px;
            z-index: 10;
        }

        /* === DATE SQUIRCLE === */
        .date-squircle {
            align-self: flex-end; 
            background: rgba(40, 40, 40, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 0.8rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #64ffda;
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Main Squircles */
        .squircle {
            background: rgba(40, 40, 40, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px; 
            padding: 2.5rem;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.9);
        }

        /* === TOP SECTION: TIMETABLE === */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: #94a3b8;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        td {
            padding: 1.2rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-weight: 500;
            line-height: 1.5;
        }

        tr {
            transition: background 0.3s ease, transform 0.2s ease;
        }

        tr:hover td {
            color: #64ffda;
        }

        tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* === BOTTOM SECTION: ARRIVAL TIME === */
        .arrival-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .arrival-left {
            font-size: 1.25rem;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        .arrival-right {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            max-width: max-content;
        }

        /* Status & Countdown text styling */
        .green-text {
            color: #4ade80;
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            background: rgba(74, 222, 128, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .countdown-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: #64ffda;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(100, 255, 218, 0.3);
        }

        .approx {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-left: 10px;
            font-weight: 500;
        }

        /* Mobile responsiveness */
        @media (max-width: 650px) {
            .squircle { padding: 1.5rem; border-radius: 24px; }
            th, td { padding: 1rem 0.5rem; font-size: 0.9rem; }
            .arrival-container { flex-direction: column; text-align: center; justify-content: center; }
            .arrival-right { max-width: 100%; justify-content: center; }
            .date-squircle { align-self: center; }
        }
    </style>
</head>
<body>

    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-trail" id="cursor-trail"></div>

    <div class="container">
        
        <!-- TOP RIGHT SQUIRCLE: Date Section -->
        <div class="date-squircle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            
            <!-- BHUVAN: UPDATE THE DATE BELOW -->
            <span>9th June, Monday</span>
            
        </div>

        <!-- TOP SQUIRCLE: Timetable Section -->
        <div class="squircle">
            <table>
                <thead>
                    <tr>
                        <th>Lecture Timings</th>
                        <th>Subject</th>
                        <th>Activity</th>
                        <th>Location</th>
                    </tr>
                </thead>
                <tbody id="timetable-body">
<!-- BHUVAN: PASTE YOUR DAILY ROWS BELOW HERE -->
                    
                    <tr>
                        <td>9:45 AM - 11:45 AM</td>
                        <td>EVS<br><span style="font-size: 0.8em; color: #94a3b8;">(Humaira Ma’am)</span></td>
                        <td>Lecture</td>
                        <td>Jai Hind College</td>
                    </tr>
                    <tr>
                        <td>12:00 PM - 3:00 PM</td>
                        <td>Applied Mathematics<br><span style="font-size: 0.8em; color: #94a3b8;">(Vinay Sir)</span></td>
                        <td>Lecture</td>
                        <td>Jai Hind College</td>
                    </tr>

                    <!-- BHUVAN: PASTE YOUR DAILY ROWS ABOVE HERE -->

                </tbody>
            </table>
        </div>

        <!-- BOTTOM SQUIRCLE: Arrival Time Section -->
        <div class="squircle">
            <div class="arrival-container">
                <div class="arrival-left" id="arrival-time-text">
                    [By --:--]
                </div>
                <div class="arrival-right" id="arrival-status">
                    <span class="green-text">Calculating...</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Logic Script -->
    <script>
        /* --- 1. Custom Cursor Logic --- */
        const cursorDot = document.getElementById('cursor-dot');
        const cursorTrail = document.getElementById('cursor-trail');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;
            
            cursorTrail.style.left = `${posX}px`;
            cursorTrail.style.top = `${posY}px`;
        });

        /* --- 2. Smart Arrival & Timezone Logic --- */
        
        function getISTTime() {
            const now = new Date();
            const istString = now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"});
            return new Date(istString);
        }

        function formatAMPM(date) {
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return `${hours}:${minutes} ${ampm}`;
        }

        function updateArrivalStatus() {
            const tbody = document.getElementById('timetable-body');
            const rows = tbody.querySelectorAll('tr');
            if (rows.length === 0) return;

            const lastRow = rows[rows.length - 1];
            const timingText = lastRow.querySelectorAll('td')[0].innerText;
            const timeParts = timingText.split('-');
            if (timeParts.length < 2) return;
            
            const endTimeStr = timeParts[1].trim(); 

            const timeMatch = endTimeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
            if (!timeMatch) return;

            let hours = parseInt(timeMatch[1], 10);
            const minutes = parseInt(timeMatch[2], 10);
            const modifier = timeMatch[3].toUpperCase();

            if (hours === 12 && modifier === 'AM') hours = 0;
            if (hours < 12 && modifier === 'PM') hours += 12;

            const nowIST = getISTTime();
            
            const lastLectureTimeIST = getISTTime();
            lastLectureTimeIST.setHours(hours, minutes, 0, 0);

            // Arrival time is 90 minutes after the lecture ends
            const arrivalTimeIST = new Date(lastLectureTimeIST.getTime() + 5400000);
            const expectedArrivalStr = formatAMPM(arrivalTimeIST);

            // Set the Left side text to the calculated arrival time
            document.getElementById('arrival-time-text').innerText = `By ${expectedArrivalStr}`;

            const arrivalStatusDiv = document.getElementById('arrival-status');

            // --- STATE MACHINE ---
            if (nowIST < lastLectureTimeIST) {
                // STATE 1: Lecture is still ongoing.
                arrivalStatusDiv.innerHTML = `<span class="green-text">Will Arrive</span>`;
            } 
            else if (nowIST >= lastLectureTimeIST && nowIST < arrivalTimeIST) {
                // STATE 2: Lecture ended. Commencing Countdown.
                const timeDiff = arrivalTimeIST - nowIST;
                
                const h = Math.floor((timeDiff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((timeDiff / 1000 / 60) % 60);
                const s = Math.floor((timeDiff / 1000) % 60);
                
                const formatted = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                
                arrivalStatusDiv.innerHTML = `
                    <span class="countdown-text">${formatted}</span> 
                    <span class="approx">(approx)</span>
                `;
            } 
            else {
                // STATE 3: Countdown finished.
                arrivalStatusDiv.innerHTML = `<span class="green-text">Will Arrive</span>`;
            }
        }

        updateArrivalStatus();
        setInterval(updateArrivalStatus, 1000);
    </script>
</body>
</html>
